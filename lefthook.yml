pre-commit:
  parallel: true
  commands:
    go-fmt:
      glob: "**/*.go"
      run: gofmt -l {staged_files} | grep . && exit 1 || exit 0
    go-vet:
      glob: "**/*.go"
      run: go vet ./...
    golangci-lint:
      glob: "**/*.go"
      run: golangci-lint run ./...
    mdlint:
      glob: "**/*.md"
      run: mdlint check {staged_files}
    shellcheck:
      glob: "scripts/**/*.sh"
      run: shellcheck {staged_files}

pre-push:
  parallel: false
  commands:
    go-test:
      glob: "**/*.go"
      run: go test ./...
    go-build:
      glob: "**/*.go"
      run: go build -o dist/skill-auditor .
    skill-validate:
      glob: "cmd/assets/**"
      run: ./dist/skill-auditor validate artifacts
    skill-duplication:
      glob: "cmd/assets/**"
      run: ./dist/skill-auditor duplication cmd/assets
    skill-batch:
      glob: "cmd/assets/**"
      run: ./dist/skill-auditor batch ./cmd/assets --fail-below B
