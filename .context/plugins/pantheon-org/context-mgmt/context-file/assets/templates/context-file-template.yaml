# Context file frontmatter template
# Schema: ../schemas/context-frontmatter.schema.json
#
# Copy the block below to the very first line of any new .context/**/*.md file.
# Remove the "related" field if there are no related files — do not leave it empty.
#
# Enum values are UPPER_CASE.
# type values   : PLAN | FINDING | ANALYSIS | INSTRUCTION | AUDIT | KNOWN_ISSUE
# status values : DRAFT | ACTIVE | DEFERRED | DONE | SUPERSEDED
#                 DEFERRED = real but intentionally parked (date-gated/blocked);
#                 the read protocol ranks it below DRAFT/ACTIVE.
# date format   : YYYY-MM-DD (creation date; do not update on edits)
# value values  : HIGH | MEDIUM | LOW — benefit-of-action, on PLAN/FINDING/KNOWN_ISSUE
#                 only. Graded against .context/instructions/value-rubric.md.
#                 Required while status is DRAFT/ACTIVE/DEFERRED on those types. Omit on
#                 ANALYSIS/INSTRUCTION/AUDIT.
# themes values : EVAL | PR-TOOLING | DOCS | GOVERNANCE | SKILL-QUALITY | DISTRIBUTION
#                 — subject axis, on PLAN/FINDING/KNOWN_ISSUE only. A multi-valued
#                 ORDERED list, written primary-first (themes[0] is the primary theme).
#                 Drawn from .context/instructions/theme-vocabulary.md. Required while
#                 status is DRAFT/ACTIVE on those types. Omit on ANALYSIS/INSTRUCTION/AUDIT.

---
title: ""
type: PLAN
status: DRAFT
date: YYYY-MM-DD
value: MEDIUM
themes:
  - GOVERNANCE
related:
  - ../relative/path/to/related.md
---
