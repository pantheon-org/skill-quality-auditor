# Context file frontmatter template
# Schema: ../schemas/context-frontmatter.schema.json
#
# Copy the block below to the very first line of any new .context/**/*.md file.
# Remove the "related" field if there are no related files — do not leave it empty.
#
# Enum values are UPPER_CASE.
# type values   : PLAN | FINDING | ANALYSIS | INSTRUCTION | AUDIT | KNOWN_ISSUE
# status values : DRAFT | ACTIVE | DONE | SUPERSEDED
# date format   : YYYY-MM-DD (creation date; do not update on edits)
# value values  : HIGH | MEDIUM | LOW — benefit-of-action, on PLAN/FINDING/KNOWN_ISSUE
#                 only. Graded against .context/instructions/value-rubric.md.
#                 Required while status is DRAFT/ACTIVE on those types. Omit on
#                 ANALYSIS/INSTRUCTION/AUDIT.

---
title: ""
type: PLAN
status: DRAFT
date: YYYY-MM-DD
value: MEDIUM
related:
  - ../relative/path/to/related.md
---
