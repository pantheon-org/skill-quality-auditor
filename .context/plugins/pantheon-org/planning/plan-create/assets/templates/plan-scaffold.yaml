# Plan scaffold template
# Schema: ../schemas/plan-scaffold.schema.json
#
# Generated by the plan-create skill. The agent fills each field
# based on user input and local conventions inferred from existing plans.
#
# Sections:
# - frontmatter     : YAML frontmatter block (type always "plan", status "draft",
#                      effort is a required S/M/L/TBD total-effort estimate,
#                      value is a required high/medium/low benefit-of-action grade)
# - goal            : one-paragraph description of the desired end state
# - scope           : what's in and out of scope (omit if not collected)
# - phases          : sequential stages with tasks and wave annotations
# - risks           : known risks and unknowns (omit if not collected)
# - verification    : how to confirm the plan was implemented correctly
# - open_questions  : unresolved items for the plan-review audit
# - related         : paths to related findings or plans

plan:
  filename: "<kebab-case-name>.md"
  frontmatter:
    title: "Plan: <Short Title>"
    type: plan
    status: draft
    date: YYYY-MM-DD
    effort: "M"  # S | M | L | TBD — total effort, matches skill-auditor remediation convention
    value: "medium"  # high | medium | low — benefit-of-action, graded against .context/instructions/value-rubric.md
    related:
      - "../findings/<source-finding>.md"
  goal: |
    <one to three sentences describing the desired end state>
  scope:
    in_scope:
      - "<item>"
    out_of_scope:
      - "<item>"
  phases:
    - name: "<Phase 1: Foundation>"
      exit_criterion: "<deliverable or gate>"
      tasks:
        - description: "<actionable task>"
          wave: "A"
          can_parallelise_with: ["B"]
        - description: "<actionable task>"
          wave: "B"
          can_parallelise_with: ["A"]
      dependencies: []
    - name: "<Phase 2: Integration>"
      exit_criterion: "<deliverable or gate>"
      tasks:
        - description: "<actionable task>"
          wave: "single"
      dependencies:
        - "Phase 1"
  risks:
    - "<what could go wrong>"
  verification:
    - "<command or check that confirms success>"
  open_questions:
    - "<unresolved decision for the reviewer>"
