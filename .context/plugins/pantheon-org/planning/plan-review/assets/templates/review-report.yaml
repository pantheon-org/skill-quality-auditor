# Consolidated Review Report template
# Schema: ../schemas/review-report.schema.json
#
# Generated by the plan-review skill after 3 subagent reviewers complete.
# The main agent fills each section with reviewer output.
#
# Sections:
# - model_configuration  : which models were used per reviewer type
# - structural_validation: frontmatter schema, body structure inference
# - implementation_arch  : phases, tasks, waves analysis
# - scores               : subjective x/10 per reviewer lens
# - critical_issues      : must-fix items grouped by reviewer
# - moderate_concerns    : should-address items grouped by reviewer
# - strengths            : positive findings grouped by reviewer
# - next_actions         : ordered list of recommended actions

report:
  title: "Consolidated Review: <plan-title>"
  sections:
    model_configuration:
      technical_strategic:
        model: "<model-name>"
        via: "general"
      risk:
        model: "<model-name>"
        via: "explore"
    structural_validation:
      frontmatter_schema: pass | fail
      frontmatter_details: "<violations-or-ok>"
      validation_script: pass | fail
      validation_output: "<script-output>"
      body_structure:
        inferred_from: <N>
        core_sections:
          goal: present | missing
          steps: present | missing
          open_questions: present | missing
        common_sections:
          scope: present | missing
          related: present | missing
          verification: present | missing
          risks: present | missing
        unusual_sections:
          - "<section-name>"
    implementation_architecture:
      phases:
        count: <N>
        names:
          - "<phase-name>"
        dependencies: explicit | implicit | missing
        exit_criteria: "<N>/<N> phases"
      task_granularity: good | too_vague | too_large
      actionable_tasks: "<N>/<N>"
      parallelisation:
        waves_identified: true | false
        tasks_flagged_parallel: "<N>/<N>"
        parallelism_opportunity: "<N> tasks"
    scores:
      technical: "<x>/10 — rationale"
      strategic: "<x>/10 — rationale"
      risk: "<x>/10 — rationale"
    critical_issues:
      technical:
        - "<item>"
      strategic:
        - "<item>"
      risk:
        - "<item>"
    moderate_concerns:
      technical:
        - "<item>"
      strategic:
        - "<item>"
      risk:
        - "<item>"
    strengths:
      technical:
        - "<item>"
      strategic:
        - "<item>"
      risk:
        - "<item>"
    next_actions:
      - action: "<description>"
        addresses: "<reviewer>"
