# Keeps GitHub Actions pins fresh so runtime deprecations (e.g. node20 EOL)
# and third-party action drift are surfaced as PRs instead of accruing
# silently. Recommended by .plumber.yaml, which enforces SHA-pinning on
# third-party actions but does not itself track version currency.
#
# For SHA-pinned actions (all third-party ones in this repo), Dependabot
# updates both the commit SHA and its trailing `# vX` version comment.
# For tag-pinned first-party actions/* it bumps the major/minor tag.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # Supply-chain cooldown (ADR-055): hold version-update PRs for 7 days so a
    # compromised or malicious release sits unadopted through its typical
    # detection/yank window before we pull it in. Mirrors mise.toml's
    # `minimum_release_age = "7d"` for mise-managed tools.
    #
    # PREREQUISITE (see known-issue dependabot-security-updates-disabled): this
    # only means "7 days UNLESS critical" while Dependabot security updates are
    # ENABLED — advisory-driven security PRs bypass cooldown (dependabot-core
    # #13979, fixed 2026-02-12). With security updates OFF, cooldown delays
    # everything, including would-be-critical fixes.
    cooldown:
      default-days: 7
    commit-message:
      prefix: chore
      include: scope
    groups:
      # One grouped PR per run keeps release-please changelogs tidy rather
      # than opening a separate PR per action.
      github-actions:
        patterns:
          - "*"
