name: Plumber

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: plumber-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plumber:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # `getplumber/plumber` pinned by commit SHA of the latest tagged release
      # (v0.3.86), not a floating tag — consistent with the pinning hygiene
      # this repo's own .plumber.yaml enforces on every other third-party action.
      #
      # threshold: '0' + soft-fail: true make the composite action's own
      # built-in "Enforce threshold" step a no-op for compliance purposes —
      # its exit code reflects an overall A-E score, not per-finding severity,
      # and must never decide pass/fail here. A non-zero exit from this step
      # therefore only ever means Plumber itself failed to run (bad config,
      # install/attestation failure), which should fail the job.
      - name: Run Plumber
        uses: getplumber/plumber@a697e9c316b058d279861719c73b87093fb5a60f # v0.3.86
        with:
          score-push: false
          threshold: '0'
          soft-fail: true
          upload-sarif: false
          sarif: ''
          output: results.json

      - name: Gate on Critical findings
        run: scripts/plumber-gate.sh results.json

      # Only push to main updates the rollup issue. It reflects the state of
      # main, not a PR branch's speculative merged state — running this on
      # pull_request too would mean concurrent/unrelated PRs fight over the
      # single rollup issue, each overwriting it with their own branch's
      # findings. The Critical gate above still runs on every PR; only the
      # non-blocking backlog tracking is push-to-main-only.
      - name: File issues for High/Medium/Low findings
        if: always() && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: scripts/plumber-file-issues.sh results.json
