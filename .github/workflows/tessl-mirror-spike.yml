name: THROWAWAY — tessl mirror spike

# Temporary workflow for .context/plans/tessl-mirror-drift-check-2026-07-06.md's
# Phase 2: confirms `tessl install` succeeds with no TESSL_TOKEN in a clean CI
# runner, gating whether Phase 3's real CI wiring can rely on plain
# `npm install -g tessl` alone. No secrets are referenced anywhere in this
# job, so a green run is conclusive proof the tokenless path works.
#
# Triggered on push to this plan's own branch — deliberately not merged to
# main first, since `workflow_dispatch` only becomes callable via API/CLI
# once a workflow file exists on the default branch, which would defeat the
# point of a throwaway spike. `workflow_dispatch` is kept for a manual re-run
# once this *is* on main, but the push trigger is how this actually ran.
#
# Delete this file once the spike goes green and its result is folded into
# Phase 3 — it exists to answer one question, not to run indefinitely.

on:
  workflow_dispatch:
  push:
    branches: [feat/tessl-mirror-drift-check-plan]

jobs:
  spike:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install tessl (no token)
        run: npm install -g tessl

      - name: tessl install
        run: tessl install

      - name: Confirm pantheon-org mirror populated
        run: |
          test -d .tessl/plugins/pantheon-org
          find .tessl/plugins/pantheon-org -mindepth 2 -maxdepth 2 -type d | sort
