name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      sha: ${{ steps.release.outputs.sha }}
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  goreleaser:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      # release-please creates the release as a DRAFT (see release-please-config.json).
      # A draft release does not create the underlying git tag ref, so we check out the
      # release commit by SHA and create/push the tag ourselves before building. goreleaser
      # derives {{.Version}} from the tag, so the tag must exist first. See ADR-053.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ needs.release-please.outputs.sha }}
      - name: Create and push tag
        run: |
          git tag "${{ needs.release-please.outputs.tag_name }}" "${{ needs.release-please.outputs.sha }}"
          git push origin "${{ needs.release-please.outputs.tag_name }}"
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Upload to the DRAFT release. Immutable releases freeze assets at publish time, so
      # assets must be attached while the release is still a draft (drafts stay mutable).
      - name: Upload artifacts to draft release
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" dist/*.tar.gz dist/*.zip dist/checksums.txt --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Publish the draft. This freezes the release WITH its assets attached, satisfying
      # GitHub immutable releases. See ADR-053 for why this flow is required.
      - name: Publish release
        run: |
          gh release edit "${{ needs.release-please.outputs.tag_name }}" --draft=false --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
