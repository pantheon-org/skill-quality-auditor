name: Skill Quality Gate

on:
  pull_request:
    paths:
      - 'skill-auditor/cmd/assets/**'
      - 'skill-auditor/**/*.go'
  push:
    branches: [main]
    paths:
      - 'skill-auditor/cmd/assets/**'
      - 'skill-auditor/**/*.go'
  workflow_dispatch:

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: skill-auditor/go.sum

      - name: Build
        run: cd skill-auditor && go build -o ../dist/skill-auditor .

      - name: Unit tests
        run: cd skill-auditor && go test ./...

      - name: Validate artifacts
        run: ./dist/skill-auditor validate artifacts

      - name: Duplication check
        run: ./dist/skill-auditor duplication skill-auditor/cmd/assets

      - name: Batch quality gate
        run: ./dist/skill-auditor batch ./skill-auditor/cmd/assets --fail-below B

      - name: Install Tessl CLI
        run: curl -fsSL https://get.tessl.io | sh

      - name: Tessl eval run
        env:
          TESSL_TOKEN: ${{ secrets.TESSL_TOKEN }}
        run: tessl eval run .
