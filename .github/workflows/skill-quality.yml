name: Skill Quality Gate

on:
  pull_request:
    paths:
      - 'cmd/assets/**'
      - '.context/plugins/**'
      - 'scripts/check-tessl-mirror-drift.sh'
      - '.github/workflows/skill-quality.yml'
  push:
    branches: [main]
    paths:
      - 'cmd/assets/**'
      - '.context/plugins/**'
      - 'scripts/check-tessl-mirror-drift.sh'
      - '.github/workflows/skill-quality.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: go.sum

      - name: Build
        run: go build -o dist/skill-auditor .

      - name: Unit tests
        run: go test ./...

      - name: Validate artifacts
        run: ./dist/skill-auditor validate artifacts

      - name: Duplication check
        run: set -o pipefail; ./dist/skill-auditor duplication cmd/assets | tee duplication-cmd-assets.md

      - name: Batch quality gate
        run: set -o pipefail; ./dist/skill-auditor batch ./cmd/assets --fail-below B | tee batch-cmd-assets.md

      # ── Tier 1: structural eval gate (required every PR/main push) ──
      # Deterministic, no key needed, ~1s (ADR-007 Tier 1).
      - name: Structural eval gate
        run: ./dist/skill-auditor eval ./cmd/assets --fail-below 0

      # ── Helper skills (.context/plugins/**) ──
      # The trigger's paths filter covers .context/plugins/**, but every check
      # above only ever touches cmd/assets — a helper-skill-only PR could go
      # green without the helper skill itself being validated at all. These
      # steps close that gap by discovering every helper skill under
      # .context/plugins/ and running the same duplication/batch/structural
      # checks used for the audited tile. All 11 existing helper skills score
      # B or above today, so --fail-below B does not retroactively break CI.
      - name: Discover helper skills
        id: helper_skills
        run: |
          set -euo pipefail
          DIRS=$(find .context/plugins -name SKILL.md -exec dirname {} \; | sort -u)
          COUNT=$(printf '%s\n' "$DIRS" | grep -c . || true)
          {
            echo "dirs<<SKILL_EOF"
            printf '%s\n' "$DIRS"
            echo "SKILL_EOF"
            echo "count=$COUNT"
          } >> "$GITHUB_OUTPUT"

      - name: Duplication check (helper skills)
        if: steps.helper_skills.outputs.count != '0'
        run: set -o pipefail; ./dist/skill-auditor duplication .context/plugins | tee duplication-helper-skills.md

      - name: Batch quality gate (helper skills)
        if: steps.helper_skills.outputs.count != '0'
        run: |
          set -euo pipefail
          ARGS=()
          while IFS= read -r d; do
            [ -n "$d" ] && ARGS+=("./$d")
          done <<< "${{ steps.helper_skills.outputs.dirs }}"
          ./dist/skill-auditor batch "${ARGS[@]}" --fail-below B | tee batch-helper-skills.md

      - name: Structural eval gate (helper skills)
        if: steps.helper_skills.outputs.count != '0'
        run: |
          set -euo pipefail
          while IFS= read -r d; do
            [ -n "$d" ] || continue
            echo "::group::eval $d"
            ./dist/skill-auditor eval "./$d" --fail-below 0
            echo "::endgroup::"
          done <<< "${{ steps.helper_skills.outputs.dirs }}"

      # ── .tessl/plugins/pantheon-org mirror drift (ADR-047, ADR-048) ──
      # Catches a `tessl install` bug (skipped file, truncated content, a
      # newly-added skill not picked up) by diffing the source under
      # .context/plugins/pantheon-org/** against a freshly installed mirror
      # in the same run — .tessl/plugins/** is gitignored (never tracked),
      # so this is the only place this class of drift is CI-catchable.
      # `continue-on-error: true` is a deliberate advisory rollout (ADR-048,
      # not a permanent choice): flip to hard-fail once this step has run
      # clean on 5 merged PRs or 2 weeks, whichever comes first.
      - uses: actions/setup-node@v4
        if: steps.helper_skills.outputs.count != '0'
        with:
          node-version: 22

      - name: Install tessl
        if: steps.helper_skills.outputs.count != '0'
        run: npm install -g tessl

      - name: Check .tessl mirror drift (helper skills)
        if: steps.helper_skills.outputs.count != '0'
        continue-on-error: true
        run: |
          set -euo pipefail
          rm -rf .tessl/plugins/pantheon-org
          tessl install
          scripts/check-tessl-mirror-drift.sh

      # ── Tier 2: LLM-judge eval (advisory only) ──
      # Triggers: workflow_dispatch, or a PR with the 'run-eval' label (and
      # never from fork PRs — fork PRs cannot see MISTRAL_API_KEY, so the
      # runner would degrade to structural-only anyway; the explicit guard
      # makes this safe). No nightly schedule — removed per user request.
      #
      # Provider is Mistral, not Anthropic: this org has no ANTHROPIC_API_KEY
      # at all (internal/llmclient's Anthropic support and default model are
      # still correct and used by anyone who does have a key — this was
      # never wrong in the Go code, only in this workflow's hardcoded
      # provider choice). Gemini, Cerebras, and Mistral were all live-tested;
      # all three connect successfully but all three hit provider-side
      # per-minute rate limits under this eval run's call volume (multiple
      # samples x scenarios x actor+judge calls) — Mistral got furthest
      # (3/6 scenarios) before internal/llmclient gained Retry-After-aware
      # backoff for 429s (see client.go's RateLimitBackoff), which should
      # let all three tolerate this workload; Mistral is kept as the
      # best-performing default from that comparison.
      - name: LLM-judge eval (advisory)
        if: |
          (github.event_name == 'workflow_dispatch') ||
          (github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork && contains(github.event.pull_request.labels.*.name, 'run-eval'))
        env:
          LLM_PROVIDER: mistral
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: ./dist/skill-auditor eval ./cmd/assets --json --samples 3 --cost-log > eval-results.json
        continue-on-error: true

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: eval-results.json
          if-no-files-found: ignore

      - name: Post eval results comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let results;
            try {
              results = JSON.parse(fs.readFileSync('eval-results.json', 'utf8'));
            } catch (e) {
              core.info('No eval-results.json found, skipping comment');
              return;
            }
            const status = results.overall_pass ? '✅ PASS' : '⚠️ ATTENTION';
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const lines = [
              '## 🔍 Skill Quality Gate — Advisory LLM-Judge Eval',
              `### ${status}`,
              `Provider: \`${results.provider || 'n/a'}\` | Judge prompt version: \`${results.judge_prompt_version || 'n/a'}\``,
              `Model: \`${results.model || 'n/a'}\` | Samples: ${results.samples || 1}`,
              '',
              '| Scenario | Total | Status |',
              '|----------|-------|--------|',
              ...(results.scenarios || []).map(s =>
                `| ${s.id} | ${s.total}/100 | ${s.pass ? '✓' : '✗'} |`
              ),
              '',
              `_[Advisory only — does not block merge]_ · _[View this run](${runUrl})_`
            ];
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: lines.join('\n')
            });

      # ── Structural audit comment (always runs, unlike the advisory eval above) ──
      # Duplication + batch grade results are deterministic and gate every PR,
      # but previously only appeared in Actions logs. This surfaces them
      # directly on the PR, updating one comment in place across re-pushes
      # instead of spamming a new one each time.
      - name: Post structural audit comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const readFile = (path) => {
              try { return fs.readFileSync(path, 'utf8').trim(); } catch (e) { return null; }
            };
            const sections = [
              { title: 'cmd/assets — Duplication', file: 'duplication-cmd-assets.md' },
              { title: 'cmd/assets — Batch Quality Gate', file: 'batch-cmd-assets.md' },
              { title: 'Helper Skills — Duplication', file: 'duplication-helper-skills.md' },
              { title: 'Helper Skills — Batch Quality Gate', file: 'batch-helper-skills.md' },
            ];
            const parts = sections
              .map(s => ({ ...s, content: readFile(s.file) }))
              .filter(s => s.content)
              .map(s => `<details><summary>${s.title}</summary>\n\n${s.content}\n\n</details>`);
            if (parts.length === 0) {
              core.info('No structural audit output found, skipping comment');
              return;
            }
            const status = '${{ job.status }}' === 'success' ? '✅ PASS' : '⚠️ FAILED';
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const marker = '<!-- skill-quality-structural-comment -->';
            const body = [
              marker,
              '## 🔍 Skill Quality Gate — Structural Audit',
              `### ${status}`,
              '_Duplication + per-skill grade gate — deterministic, runs on every PR (separate from the advisory LLM-judge eval, which is opt-in via the `run-eval` label)._',
              '',
              ...parts,
              '',
              `_[View this run](${runUrl})_`,
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body });
            }

      # ── Proving period: Tessl review kept alongside the native runner ──
      # Both steps use continue-on-error so CI is always green; "green" is
      # defined as the native runner's JSON showing overall_pass: true.
      # Remove this block + the TESSL_TOKEN secret after 2 weeks of green
      # native-eval runs (per native-eval-runner plan Phase 3).
      - uses: tesslio/setup-tessl@25ec223fc0da33b41b8044ff5ab2b85235f4f91e # v2
        if: always()
        with:
          token: ${{ secrets.TESSL_TOKEN }}
      - name: Tessl review run
        if: always()
        run: tessl review run cmd/assets/ --workspace pantheon-ai --json --threshold 80
        continue-on-error: true