name: PR Agent

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
    # PRs touching only cmd/assets/** already get an LLM review from the
    # skill-quality LLM-judge (skill-quality.yml) — skip here to avoid a
    # second, redundant opinion on the same diff. paths-ignore only skips
    # the run when EVERY changed file matches, so mixed PRs still run.
    paths-ignore:
      - 'cmd/assets/**'
  issue_comment:

permissions:
  issues: write
  pull-requests: write

jobs:
  pr_agent_job:
    # Fork PRs never see GEMINI_API_KEY/secrets on a plain `pull_request`
    # trigger (GitHub redacts them) — skip rather than let the step fail
    # with an opaque auth error. No fork PR has ever been opened against
    # this repo, but forking is enabled, so this is a real (if rare) path.
    # Mirrors plumber.yml's existing fork handling. `!= true` (not
    # `== false`) because `issue_comment` events don't populate
    # `pull_request.head.repo.fork` at all — it's null there, and this
    # trigger must still run for that event.
    if: ${{ github.event.sender.type != 'Bot' && github.event.pull_request.head.repo.fork != true }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Digest-pinned to the `0.38.0-github_action` multi-arch image
      # (confirmed via Docker Hub's tags API, ADR-041 #4) rather than the
      # floating `the-pr-agent/pr-agent@main` ref shown in the project's own
      # quick-start — this repo pins every third-party action by immutable
      # reference (see .plumber.yaml's actionsMustBePinnedByCommitSha).
      #
      # continue-on-error: this workflow is advisory-only (plan Decision 1)
      # — a Gemini outage, rate-limit, or bad response must never turn this
      # into a red, blocking check.
      - name: PR Agent action step
        continue-on-error: true
        uses: docker://pragent/pr-agent@sha256:ea2ea90f072fd97708755e59827a317272f66097a1ef349eca23d39160bb0baf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Gemini via Google AI Studio's free tier — no Anthropic/OpenAI/
          # Bedrock credential is available for this integration (ADR-041 #3).
          config.model: "gemini/gemini-1.5-flash"
          config.fallback_models: '["gemini/gemini-1.5-flash"]'
          GOOGLE_AI_STUDIO.GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Only describe + review for this initial rollout; improve/ask are
          # deferred pending a trial-period read on signal-to-noise.
          github_action_config.auto_describe: "true"
          github_action_config.auto_review: "true"
