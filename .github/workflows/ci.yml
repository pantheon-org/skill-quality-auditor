name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: gofmt
        run: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "Files not formatted:"; echo "$files"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7
        with:
          version: v2.11.4

      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2

      - name: markdownlint
        run: markdownlint-cli2 "**/*.md"

      - name: shellcheck
        run: shellcheck scripts/*.sh

  docs-drift:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check for new docs drift
        run: scripts/check-docs-drift.sh "origin/${{ github.base_ref }}"

      - name: Report cumulative docs drift (informational, never fails)
        # Cumulative mode always exits 0 by design — this step exists so the
        # same warnings hk.pkl's local pre-push hook shows are also visible
        # in every PR's Actions log, since pre-push hooks are bypassable
        # (--no-verify, web-UI merges, API commits) and this job is not
        # (see .context/findings/docs-drift-cumulative-mode-ci-gap-2026-07-06.md).
        run: scripts/check-docs-drift.sh

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: go test
        run: go test ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: go build
        run: go build ./...
