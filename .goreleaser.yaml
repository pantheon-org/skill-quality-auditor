version: 2

before:
  hooks:
    - go mod tidy

builds:
  - binary: skill-auditor
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/pantheon-org/skill-quality-auditor/cmd.buildVersion={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

brews:
  - name: skill-auditor
    repository:
      owner: pantheon-org
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/pantheon-org/skill-quality-auditor"
    description: "Score AI skills against a 9-dimension quality framework"
    license: "MIT"
    install: |
      bin.install "skill-auditor"
    test: |
      system "#{bin}/skill-auditor", "version"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
